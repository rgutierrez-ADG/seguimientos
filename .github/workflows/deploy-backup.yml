## CRONOGRAMA AUTOMÁTICO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Hora de ejecución:  02:00 UTC = 23:00 ARG (verano) / 22:00 ARG (invierno)
  Frecuencia:         Todos los días
  Retención en KV:    90 días (luego se borra automáticamente)
  Retención en Drive: Indefinida (podés borrar manualmente los viejos)

Nomenclatura de archivos en Drive:
  backup_sgcia_2026-05-21.json
  backup_sgcia_2026-05-22.json
  backup_sgcia_2026-05-23.json
  ...

---

## QUÉ CONTIENE CADA BACKUP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Cada archivo JSON incluye:

  metadata:
    - timestamp       → Cuándo se hizo el backup
    - cantHallazgos   → Cuántos hallazgos había en ese momento
    - cantAdjuntos    → Cuántos archivos adjuntos
    - cantLogs        → Cuántas entradas de auditoría

  state:
    - treatments      → TODOS los hallazgos con sus tratamientos completos
    - descargas       → Historial de descargas

  admins:           → Lista de administradores activos
  allowlist:        → Lista de usuarios externos autorizados
  adjuntosKeys:     → Lista de claves de adjuntos (los binarios NO se copian
                      por tamaño, pero quedan en el KV original de Cloudflare)

---

## CÓMO RESTAURAR UN BACKUP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

En caso de pérdida de datos:

1. Bajá el backup deseado desde Drive (ej: backup_sgcia_2026-05-20.json)
2. En terminal:

```bash
# Restaurar el estado (tratamientos)
wrangler kv key put "state" --path ./backup_sgcia_2026-05-20.json \
  --binding SGCIA_KV

# O leer el JSON, extraer el campo "state" y subirlo:
cat backup_sgcia_2026-05-20.json | python3 -c "
import json, sys
data = json.load(sys.stdin)
print(json.dumps(data['state']))
" > state_restaurado.json

wrangler kv key put "state" --path ./state_restaurado.json \
  --binding SGCIA_KV
```

3. Verificar en la plataforma que los datos están correctos.

---

## ERRORES COMUNES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Error: "Error obteniendo token Google: 400"
  → El SA_KEY está mal formateado. Asegurate de pegar el JSON completo.

Error: "Error subiendo a Drive: 403"
  → La Service Account no tiene acceso a la carpeta. Repasar Paso 2.

Error: "BACKUPS_KV is not defined"
  → El ID en wrangler-backup.toml no fue reemplazado. Repasar Paso 3.

Error: "No autorizado" al llamar /run-backup
  → El header X-Backup-Token no coincide. Usar el token del Paso 4.

