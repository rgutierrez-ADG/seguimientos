name: Deploy SGCIA Backup Worker

on:
  workflow_dispatch:

jobs:
  deploy-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Wrangler
        run: npm install -g wrangler

      - name: Crear namespace BACKUPS_KV
        id: create_kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          OUTPUT=$(wrangler kv namespace create BACKUPS_KV 2>&1)
          echo "$OUTPUT"
          KV_ID=$(echo "$OUTPUT" | grep -oP '(?<=id = ")[^"]+')
          echo "KV_ID=$KV_ID" >> $GITHUB_OUTPUT

      - name: Actualizar wrangler-backup.toml
        run: |
          sed -i "s/REEMPLAZAR_CON_ID_DE_BACKUPS_KV/${{ steps.create_kv.outputs.KV_ID }}/" wrangler-backup.toml

      - name: Cargar secret SA_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo '${{ secrets.SA_KEY }}' | wrangler secret put SA_KEY --config wrangler-backup.toml

      - name: Cargar secret BACKUP_RUN_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo '${{ secrets.BACKUP_RUN_TOKEN }}' | wrangler secret put BACKUP_RUN_TOKEN --config wrangler-backup.toml

      - name: Deploy backup worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy --config wrangler-backup.toml
